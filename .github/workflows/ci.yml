name: CI

on:
  # Scope push runs to main only. A bare `push:` fires on every branch, so a PR
  # branch got two `test` runs (push + pull_request) on the same SHA. PRs are
  # covered by the pull_request event; push covers post-merge main.
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          bash scripts/sync.test.sh
          bash scripts/unsync.test.sh
          bash scripts/validate_gate.test.sh
          bash scripts/security_guard.test.sh
          bash scripts/piv_check.test.sh
          bash scripts/notify.test.sh

  zh-description:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Require 變更說明 section in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s' "$PR_BODY" | grep -qF '## 變更說明'; then
            echo "ERROR: PR body must contain a '## 變更說明' section (繁體中文 change summary)."
            exit 1
          fi
