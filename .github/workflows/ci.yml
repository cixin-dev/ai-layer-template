name: CI

on:
  # Scope push runs to main only. A bare `push:` fires on every branch, so a PR
  # branch got two `test` runs (push + pull_request) on the same SHA. PRs are
  # covered by the pull_request event; push covers post-merge main.
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the doc change gate can resolve the merge base for
          # `git diff origin/<base>...HEAD` (three-dot). A shallow clone (the
          # default fetch-depth: 1) has no common ancestor → `fatal: no merge base`.
          fetch-depth: 0
      - name: Run tests
        run: |
          bash scripts/sync.test.sh
          bash scripts/unsync.test.sh
          bash scripts/validate_gate.test.sh
          bash scripts/security_guard.test.sh
          bash scripts/piv_check.test.sh
          bash scripts/notify.test.sh
          bash scripts/doc_change_gate.test.sh
      - name: Fetch base branch for doc change gate
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}
      - name: Doc change gate
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          printf '%s' "$PR_BODY" > /tmp/pr_body.txt
          bash scripts/doc_change_gate.sh /tmp/changed_files.txt /tmp/pr_body.txt
